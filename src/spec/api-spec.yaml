openapi: 3.0.3
info:
  title: SAP S/4HANA Financial Integration API
  version: 1.0.0
  description: API specification for the SAP to Financial Analytics integration framework.
servers:
  - url: http://localhost:4000
paths:
  /api/status:
    get:
      summary: Service health check
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  timestamp:
                    type: string
  /api/sap/invoices:
    get:
      summary: Retrieve sample SAP invoice data
      responses:
        '200':
          description: Invoice payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SAPInvoice'
                  count:
                    type: integer
                  source:
                    type: string
  /api/sap/customers:
    get:
      summary: Retrieve sample SAP customer data
      responses:
        '200':
          description: Customer payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SAPCustomer'
                  count:
                    type: integer
                  source:
                    type: string
  /api/integration/run:
    post:
      summary: Execute the SAP to analytics integration flow
      responses:
        '200':
          description: Integration summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationSummary'
  /api/analytics/ingest:
    post:
      summary: Receive analytics ingestion payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  type: array
                  items:
                    $ref: '#/components/schemas/AnalyticsRecord'
      responses:
        '200':
          description: Ingestion acknowledgement
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: integer
                  accepted:
                    type: integer
                  rejected:
                    type: integer
                  protocol:
                    type: string
                  sourceSystem:
                    type: string
                  timestamp:
                    type: string
components:
  schemas:
    SAPInvoice:
      type: object
      properties:
        invoiceId:
          type: string
        customerId:
          type: string
        postingDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        invoiceAmount:
          type: number
        currency:
          type: string
        paymentStatus:
          type: string
          enum: [PAID, OPEN, OVERDUE]
        companyCode:
          type: string
        profitCenter:
          type: string
        taxAmount:
          type: number
      required: [invoiceId, customerId, postingDate, dueDate, invoiceAmount, currency, paymentStatus]
    SAPCustomer:
      type: object
      properties:
        customerId:
          type: string
        name:
          type: string
        region:
          type: string
        creditGroup:
          type: string
        industry:
          type: string
      required: [customerId, name, region, creditGroup]
    AnalyticsRecord:
      type: object
      properties:
        recordId:
          type: string
        customerName:
          type: string
        region:
          type: string
        revenue:
          type: number
        outstandingBalance:
          type: number
        invoiceDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        riskScore:
          type: number
        currency:
          type: string
        sourceSystem:
          type: string
        segment:
          type: string
      required: [recordId, customerName, region, revenue, outstandingBalance, invoiceDate, dueDate, riskScore, currency, sourceSystem]
    IntegrationSummary:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        extractedRecords:
          type: integer
        transformedRecords:
          type: integer
        ingestion:
          type: object
          properties:
            received:
              type: integer
            accepted:
              type: integer
            rejected:
              type: integer
            protocol:
              type: string
            timestamp:
              type: string
      required: [status, message, extractedRecords, transformedRecords, ingestion]
